name: CI
# Build, test, and integration-test the Gauntlet codebase
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version: '1.24'

      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'

      - name: Verify module checksums
        run: go mod verify

      - name: Build
        run: make build

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8

      - name: Lint
        run: golangci-lint run

      - name: Test
        run: make test

      - name: Install Python SDK (dev)
        run: pip install -e "sdk/python[dev]"

      - name: Install Python adapter integration dependencies
        run: pip install -r sdk/python/tests/requirements-integration.txt

      - name: Python SDK tests
        run: pytest -q sdk/python/tests

      - name: Python SDK mypy
        run: mypy --strict sdk/python/gauntlet/

      - name: Python SDK pyright
        run: pyright sdk/python/gauntlet/

      - name: Integration test
        run: make test-example
