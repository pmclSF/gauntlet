name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-schema:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Schema publication step for docs hosting on tagged releases.
      - name: Stage schema for docs site
        run: |
          mkdir -p docs/schema
          cp schema/scenario.schema.json docs/schema/scenario.json

      - name: Upload schema artifact
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: gauntlet-schema
          path: docs/schema/scenario.json
          retention-days: 30
