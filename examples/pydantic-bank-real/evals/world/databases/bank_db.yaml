database: bank_db
description: Customer banking database
adapter: sqlite3

seed_sets:
  standard_customer:
    tables:
      customers:
        columns:
          id: INTEGER PRIMARY KEY
          name: TEXT
          balance: REAL
        rows:
          - id: 123
            name: "John"
            balance: 123.45
          - id: 456
            name: "Jane"
            balance: 567.89

  customer_with_sensitive_data:
    tables:
      customers:
        columns:
          id: INTEGER PRIMARY KEY
          name: TEXT
          balance: REAL
          ssn: TEXT
          account_number: TEXT
        rows:
          - id: 123
            name: "John"
            balance: 123.45
            ssn: "123-45-6789"
            account_number: "9876543210"
