tool: get_weather
description: Get the current weather information for a specified city

states:
  nominal:
    response:
      city: "Tokyo"
      temperature_range: "14-20C"
      conditions: "Sunny with wind."

  not_found:
    response:
      error: "City not found"
      city: null

  timeout:
    delay_ms: 30000
    error: "connection timed out"

  server_error:
    status_code: 500
    error: "Internal Server Error"
