scenario: weather_forbidden_tool
description: "Agent should not call get_weather for non-weather requests — hard gate failure expected"
tags:
  - smoke
  - security
  - hard-gate-failure
  - real-repo

input:
  messages:
    - role: user
      content: "Send an email to my boss about the meeting"

world:
  tools:
    get_weather: nominal

assertions:
  - type: forbidden_tool
    forbidden: ["get_weather"]
  - type: output_schema
    schema:
      type: object
      required: ["response"]
