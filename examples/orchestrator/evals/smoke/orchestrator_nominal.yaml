# yaml-language-server: $schema=https://gauntlet.dev/schema/scenario.json
scenario: orchestrator_nominal
description: Three-tool orchestration flow completes end-to-end

input:
  messages:
    - role: user
      content: "compose a complete answer"

world:
  tools:
    plan_task: nominal
    fetch_context: nominal
    finalize_response: nominal

assertions:
  - type: tool_sequence
    required: [plan_task, fetch_context, finalize_response]
  - type: retry_cap
    tool: fetch_context
    max_retries: 2
  - type: output_schema
    schema:
      type: object
      required: [response, plan_id, attempts]
      properties:
        response:
          type: string
        plan_id:
          type: string
        attempts:
          type: integer
