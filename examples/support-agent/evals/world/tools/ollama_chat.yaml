tool: ollama_chat
description: Query a local Ollama model for a response
states:
  nominal:
    response:
      model: "llama3.2"
      message:
        role: "assistant"
        content: "Order ord-001 is shipped and expected by Friday."
      done_reason: "stop"
      done: true

  timeout:
    delay_ms: 30000
    error: "local ollama request timed out"
