# yaml-language-server: $schema=https://gauntlet.dev/schema/scenario.json
# model: gemini-2.0-flash
scenario: gemini_query
description: "Gemini smoke query routes through Gauntlet proxy and tool world"
tags:
  - smoke
  - gemini

input:
  messages:
    - role: user
      content: "Check status for order ord-001"

world:
  tools:
    order_lookup: nominal
    ollama_chat: nominal
  databases:
    orders_db: standard_order

assertions:
  - type: tool_sequence
    required: ["order_lookup"]
  - type: output_schema
    schema:
      type: object
      required: ["response"]
