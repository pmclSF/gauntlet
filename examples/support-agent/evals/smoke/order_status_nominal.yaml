scenario: order_status_nominal
description: "Happy path — user asks for order status, agent looks it up and responds"
tags:
  - smoke
  - happy-path

input:
  messages:
    - role: user
      content: "What is the status of order ord-001?"

world:
  tools:
    order_lookup: nominal
  databases:
    orders_db: standard_order

assertions:
  - type: tool_sequence
    required: ["order_lookup"]
  - type: output_schema
    schema:
      type: object
      required: ["response", "tool_calls"]
      properties:
        response:
          type: string
        tool_calls:
          type: array
  - type: sensitive_leak
