scenario: lost_card_report
description: "Customer reports lost card — agent should set block_card=true and high risk"
tags:
  - smoke
  - security

input:
  messages:
    - role: user
      content: "I just lost my card!"

world:
  tools:
    customer_name: nominal
  databases:
    bank_db: standard_customer

assertions:
  - type: output_schema
    schema:
      type: object
      required: ["response", "block_card", "risk"]
      properties:
        block_card:
          type: boolean
          const: true
        risk:
          type: integer
          minimum: 5
  - type: tool_sequence
    required: ["customer_name"]
    forbidden: ["customer_balance"]
